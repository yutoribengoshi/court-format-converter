<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>裁判所書式変換</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      padding: 20px;
      color: #333;
      background: #fafafa;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a1a;
    }
    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .section-desc {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .spec-list {
      font-size: 11px;
      color: #555;
    }
    .spec-row {
      display: flex;
      padding: 2px 0;
    }
    .spec-label {
      width: 60px;
      font-weight: 600;
      color: #444;
      flex-shrink: 0;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .checkbox-group label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    button.primary {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0078d4;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.15s;
    }
    button.primary:hover { background: #106ebe; }
    button.primary:active { background: #005a9e; }
    button.primary:disabled, button.secondary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button.secondary {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #0078d4;
      background: #fff;
      border: 2px solid #0078d4;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.15s;
    }
    button.secondary:hover { background: #f0f6ff; }
    button.secondary:active { background: #deecf9; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      min-height: 20px;
    }
    #status.error { color: #d13438; }
    #status.success { color: #107c10; }
    .footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }
    .footer a { color: #0078d4; text-decoration: none; }
  </style>
</head>
<body>
  <h1>裁判所書式変換</h1>
  <p class="description">
    現在開いている文書のページ設定・フォント・インデント・全角変換を
    裁判所実務の書式慣行に準拠した体裁に一括整形します。
  </p>

  <div class="section">
    <div class="section-title">変換項目</div>
    <div class="section-desc">適用する整形項目を選択してください</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="optPage" checked> ページ設定（A4・余白・行数・文字数）</label>
      <label><input type="checkbox" id="optFont" checked> フォント統一（MS 明朝 12pt）</label>
      <label><input type="checkbox" id="optIndent" checked> 見出し検出・インデント適用</label>
      <label><input type="checkbox" id="optZenkaku" checked> 半角→全角変換</label>
      <label><input type="checkbox" id="optFooter" checked> ページ番号（フッター中央）</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">書式設定（ページ設定のみ）</div>
    <div class="section-desc">ページ設定を裁判所書式に変更します</div>
    <div class="spec-list">
      <div class="spec-row"><span class="spec-label">用紙</span><span>A4縦</span></div>
      <div class="spec-row"><span class="spec-label">余白</span><span>上35 下25 左30 右20mm</span></div>
      <div class="spec-row"><span class="spec-label">行数</span><span>26行 x 37文字</span></div>
    </div>
  </div>
  <button class="secondary" id="btnSetup">書式設定</button>
  <button class="primary" id="btnConvert">変換を実行</button>
  <div id="status"></div>

  <div class="footer">
    <a href="https://github.com/yutoribengoshi/court-format-converter" target="_blank">court-format-converter</a>
    &mdash; MIT License
  </div>

  <script src="converter.js?v=20260405e"></script>
  <script src="taskpane.js?v=20260405e"></script>
</body>
</html>
